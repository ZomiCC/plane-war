<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL STRIKE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="menu-screen" class="overlay hidden">
            <div class="terminal-card">
                <h1 class="game-title">TERMINAL<br>STRIKE</h1>
                <p class="subtitle">> SYSTEM READY</p>
                <button id="startBtn" class="btn">[ START ]</button>
                <div class="controls-info">
                    <p>[ MOUSE ] - MOVE</p>
                    <p>[ SPACE ] - FIRE</p>
                    <p>[ P ] - PAUSE</p>
                </div>
            </div>
        </div>
        
        <div id="pause-screen" class="overlay">
            <div class="terminal-card terminal-card-small">
                <h1 class="boss-warning">⚠ PAUSED ⚠</h1>
                <button id="resumeBtn" class="btn">[ RESUME ]</button>
                <button id="restartBtnPause" class="btn btn-secondary">[ RESTART ]</button>
            </div>
        </div>
        
        <div id="gameover-screen" class="overlay">
            <div class="terminal-card terminal-card-result">
                <h1>GAME OVER</h1>
                <div class="result-rank" id="result-rank">B</div>
                <p id="final-score">0</p>
                <p id="best-score">BEST: 0</p>
                <div class="result-stats" id="result-stats">
                    <span>KILLS: 0</span>
                    <span>ITEMS: 0</span>
                    <span>TIME: 0s</span>
                </div>
                <button id="restartBtn" class="btn">[ RETRY ]</button>
            </div>
        </div>

        <div id="theme-screen" class="overlay hidden">
            <div class="terminal-card theme-card-container">
                <h1 class="theme-title">SELECT STYLE</h1>
                <p class="theme-subtitle">> CHOOSE YOUR VISUAL THEME</p>
                <div class="theme-cards"></div>
                <button class="btn theme-confirm-btn">[ CONFIRM ]</button>
            </div>
        </div>
    </div>
    
    <script src="js/themes/theme-config.js"></script>
    <script src="js/themes/renderers/base-renderer.js"></script>
    <script src="js/themes/renderers/theme-renderers.js"></script>
    <script src="js/themes/theme-manager.js"></script>
    <script src="js/themes/theme-selector.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/props.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
