<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <!-- 开始界面 -->
        <div id="menu-screen" class="overlay">
            <h1 class="game-title">飞 机 大 战</h1>
            <p class="subtitle">经典射击游戏</p>
            <button id="startBtn" class="btn">开始游戏</button>
            <div class="controls-info">
                <p>鼠标 / 方向键 — 移动飞机</p>
                <p>空格键 — 发射子弹</p>
                <p>P 键 — 暂停游戏</p>
            </div>
        </div>
        <!-- 暂停界面 -->
        <div id="pause-screen" class="overlay hidden">
            <h1>游 戏 暂 停</h1>
            <button id="resumeBtn" class="btn">继续游戏</button>
            <button id="restartBtnPause" class="btn btn-secondary">重新开始</button>
        </div>
        <!-- 结束界面 -->
        <div id="gameover-screen" class="overlay hidden">
            <h1>游 戏 结 束</h1>
            <p id="final-score">得分: 0</p>
            <p id="best-score">最高分: 0</p>
            <button id="restartBtn" class="btn">再来一局</button>
        </div>
    </div>

    <script src="js/bullet.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/props.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
